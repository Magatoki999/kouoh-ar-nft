<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>香訪 (Kouoh) AR - 香りの記憶</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- A-Frame & MindAR -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <!-- Stripe & Privy -->
    <script src="https://js.stripe.com/v3/"></script>
    <script src="https://auth.privy.io/widget.js"></script>
    <style>
        :root {
            --kouoh-gold: #D4955A; /* 金茶 */
            --kouoh-dark: #3d342d; /* 墨色に近い茶 */
            --kouoh-bg: #fdfaf5;   /* 鳥の子色（和紙） */
        }
        body { background-color: var(--kouoh-bg); font-family: "Sawarabi Mincho", serif; }
        .ui-overlay {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; width: 90%; text-align: center;
        }
        .btn-primary {
            background: var(--kouoh-gold); color: white; border: none;
            padding: 15px 30px; font-size: 1.1rem; border-radius: 2px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- AR シーン -->
    <a-scene 
        mindar-image="imageTargetSrc: assets/targets/targets.mind; filterMinCF:0.001; filterBeta:0.01;" 
        color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <!-- 仮のモデルとして oritsuru を流用、後に avatar.glb へ差し替え -->
            <a-asset-item id="avatarModel" src="https://magatoki999.github.io/goshuin-ar-hounou/assets/models/oritsuru_merrygoround.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-gltf-model src="#avatarModel" rotation="0 0 0" position="0 -0.2 0.1" scale="0.1 0.1 0.1"></a-gltf-model>
            <!-- 煙エフェクト（components/smoke-effect.js が読み込まれている前提） -->
            <a-entity incense-smoke position="0 -0.5 0"></a-entity>
        </a-entity>
    </a-scene>

    <!-- UI レイヤー -->
    <div class="ui-overlay" id="ui-panel">
        <div id="status-msg" style="margin-bottom: 10px; color: var(--kouoh-dark);">パッケージをカメラにかざしてください</div>
        <button id="mint-start-btn" class="btn-primary" style="display:none;">購入証明NFTを受け取る</button>
    </div>

    <!-- 決済モーダル等は goshuin-ar-hounou から移植 -->
    <div id="payment-modal" class="modal" style="display:none;">
        <!-- Stripe Element がここにマウントされる -->
    </div>

    <script src="js/app.js"></script>
</body>
</html>
